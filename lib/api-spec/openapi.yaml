openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: movies
    description: Movie data from TMDB
  - name: auth
    description: User authentication
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /my-list:
    get:
      operationId: getMyList
      tags: [watchlist]
      summary: Get current user's watchlist
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Watchlist items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: addToMyList
      tags: [watchlist]
      summary: Add a movie to watchlist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToWatchlistBody"
      responses:
        "201":
          description: Movie added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistMovieItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /my-list/{tmdbId}:
    delete:
      operationId: removeFromMyList
      tags: [watchlist]
      summary: Remove a movie from watchlist
      security:
        - bearerAuth: []
      parameters:
        - name: tmdbId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /movies/search:
    get:
      operationId: searchMovies
      tags: [movies]
      summary: Search movies by query
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
  /movies/genres:
    get:
      operationId: getGenres
      tags: [movies]
      summary: Get movie genre list
      responses:
        "200":
          description: List of genres
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenreListResponse"
  /movies/by-genre:
    get:
      operationId: getMoviesByGenre
      tags: [movies]
      summary: Get movies by genre ID
      parameters:
        - name: genre_id
          in: query
          required: true
          schema:
            type: integer
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Movies in genre
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
  /movies/trending:
    get:
      operationId: getTrendingMovies
      tags: [movies]
      summary: Get trending movies
      responses:
        "200":
          description: List of trending movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
  /movies/popular:
    get:
      operationId: getPopularMovies
      tags: [movies]
      summary: Get popular movies
      responses:
        "200":
          description: List of popular movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
  /movies/top-rated:
    get:
      operationId: getTopRatedMovies
      tags: [movies]
      summary: Get top rated movies
      responses:
        "200":
          description: List of top rated movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
  /movies/now-playing:
    get:
      operationId: getNowPlayingMovies
      tags: [movies]
      summary: Get now playing movies
      responses:
        "200":
          description: List of now playing movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
  /movies/upcoming:
    get:
      operationId: getUpcomingMovies
      tags: [movies]
      summary: Get upcoming movies
      responses:
        "200":
          description: List of upcoming movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
  /movies/{id}/videos:
    get:
      operationId: getMovieVideos
      tags: [movies]
      summary: Get videos (trailers) for a movie
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoListResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /movies/{id}:
    get:
      operationId: getMovieDetail
      tags: [movies]
      summary: Get movie detail by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Movie detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - name
        - email
        - password
    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password
    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
      required:
        - id
        - name
        - email
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - token
        - user
    Movie:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        overview:
          type: string
        poster_path:
          type: ["string", "null"]
        backdrop_path:
          type: ["string", "null"]
        vote_average:
          type: number
        vote_count:
          type: integer
        release_date:
          type: string
        genre_ids:
          type: array
          items:
            type: integer
        popularity:
          type: number
      required:
        - id
        - title
        - overview
        - vote_average
        - vote_count
        - release_date
        - genre_ids
        - popularity
    MovieListResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/Movie"
        page:
          type: integer
        total_pages:
          type: integer
        total_results:
          type: integer
      required:
        - results
        - page
        - total_pages
        - total_results
    Genre:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
        - name
    WatchlistMovieItem:
      type: object
      properties:
        id:
          type: integer
        tmdb_id:
          type: integer
        title:
          type: string
        poster_path:
          type: ["string", "null"]
        backdrop_path:
          type: ["string", "null"]
        vote_average:
          type: ["number", "null"]
        release_date:
          type: ["string", "null"]
        added_at:
          type: string
      required:
        - id
        - tmdb_id
        - title
        - added_at
    WatchlistResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WatchlistMovieItem"
      required:
        - items
    AddToWatchlistBody:
      type: object
      properties:
        tmdb_id:
          type: integer
        title:
          type: string
        poster_path:
          type: ["string", "null"]
        backdrop_path:
          type: ["string", "null"]
        vote_average:
          type: ["number", "null"]
        release_date:
          type: ["string", "null"]
      required:
        - tmdb_id
        - title
    VideoResult:
      type: object
      properties:
        id:
          type: string
        key:
          type: string
        name:
          type: string
        site:
          type: string
        type:
          type: string
      required:
        - id
        - key
        - name
        - site
        - type
    VideoListResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/VideoResult"
      required:
        - results
    GenreListResponse:
      type: object
      properties:
        genres:
          type: array
          items:
            $ref: "#/components/schemas/Genre"
      required:
        - genres
    MovieDetail:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        tagline:
          type: string
        overview:
          type: string
        poster_path:
          type: ["string", "null"]
        backdrop_path:
          type: ["string", "null"]
        vote_average:
          type: number
        vote_count:
          type: integer
        release_date:
          type: string
        runtime:
          type: ["integer", "null"]
        genres:
          type: array
          items:
            $ref: "#/components/schemas/Genre"
        popularity:
          type: number
        status:
          type: string
        homepage:
          type: ["string", "null"]
      required:
        - id
        - title
        - tagline
        - overview
        - vote_average
        - vote_count
        - release_date
        - genres
        - popularity
        - status
