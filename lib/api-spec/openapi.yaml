openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: movies
    description: Movie data from TMDB
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /movies/trending:
    get:
      operationId: getTrendingMovies
      tags: [movies]
      summary: Get trending movies
      responses:
        "200":
          description: List of trending movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
  /movies/popular:
    get:
      operationId: getPopularMovies
      tags: [movies]
      summary: Get popular movies
      responses:
        "200":
          description: List of popular movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
  /movies/top-rated:
    get:
      operationId: getTopRatedMovies
      tags: [movies]
      summary: Get top rated movies
      responses:
        "200":
          description: List of top rated movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
  /movies/now-playing:
    get:
      operationId: getNowPlayingMovies
      tags: [movies]
      summary: Get now playing movies
      responses:
        "200":
          description: List of now playing movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
  /movies/upcoming:
    get:
      operationId: getUpcomingMovies
      tags: [movies]
      summary: Get upcoming movies
      responses:
        "200":
          description: List of upcoming movies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
  /movies/{id}:
    get:
      operationId: getMovieDetail
      tags: [movies]
      summary: Get movie detail by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Movie detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Movie:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        overview:
          type: string
        poster_path:
          type: ["string", "null"]
        backdrop_path:
          type: ["string", "null"]
        vote_average:
          type: number
        vote_count:
          type: integer
        release_date:
          type: string
        genre_ids:
          type: array
          items:
            type: integer
        popularity:
          type: number
      required:
        - id
        - title
        - overview
        - vote_average
        - vote_count
        - release_date
        - genre_ids
        - popularity
    MovieListResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/Movie"
        page:
          type: integer
        total_pages:
          type: integer
        total_results:
          type: integer
      required:
        - results
        - page
        - total_pages
        - total_results
    Genre:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
        - name
    MovieDetail:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        tagline:
          type: string
        overview:
          type: string
        poster_path:
          type: ["string", "null"]
        backdrop_path:
          type: ["string", "null"]
        vote_average:
          type: number
        vote_count:
          type: integer
        release_date:
          type: string
        runtime:
          type: ["integer", "null"]
        genres:
          type: array
          items:
            $ref: "#/components/schemas/Genre"
        popularity:
          type: number
        status:
          type: string
        homepage:
          type: ["string", "null"]
      required:
        - id
        - title
        - tagline
        - overview
        - vote_average
        - vote_count
        - release_date
        - genres
        - popularity
        - status
