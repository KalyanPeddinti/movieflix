kind = "web"
previewPath = "/gmu-website/"
title = "GMU Website"
version = "1.0.0"
id = "artifacts/gmu-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/gmu-website/" ]
localPort = 23036

[services.development]
run = "pnpm --filter @workspace/gmu-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gmu-website", "run", "build" ]
publicDir = "artifacts/gmu-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23036"
BASE_PATH = "/gmu-website/"
